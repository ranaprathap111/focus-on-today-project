<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus on Today</title>
 
    <link rel="stylesheet" href="./focus.css">
    <script src="./focus.js" defer></script>
</head>
<body>
    <main>
        <h1 class="heading"><span class="focus_textcolour">Focus on</span> Today</h1>
        <div class="app-container ">
            <h3 class="title">Today <img src="https://easydrawingguides.com/wp-content/uploads/2018/09/Sun-10.png" 
                alt="image of sun" class="sun-icon"></h3>
                <p class="labeltext">Raise the bar by copleting your goal!</p>
                <div class="progress-bar">
                    <div class="progress-value"><span>1/3 completed</span></div> 
                    <p class="label-setgoal">please set all the goals!</p>
                </div>
                <div class="addgoal1 ">
                    <div class="custom_checkbox">
                        <img class="check_icon" src="./image/check-icon.svg" alt="teck_mark">
                    </div> 
                    <input class="input_text" id="first" type="text" placeholder="Add new goals.." >
                </div> 
                <div class="addgoal1">
                    <div class="custom_checkbox">
                        <img class="check_icon" src="./image/check-icon.svg" alt="teck_mark">
                    </div>
                    <input class="input_text" id="second" type="text" placeholder="Add new goals.." >
                </div> 
                <div class="addgoal1">
                    <div class="custom_checkbox">
                        <img class="check_icon" src="./image/check-icon.svg" alt="teck_mark">
                    </div>
                    <input class="input_text" id="third" type="text" placeholder="Add new goals.." > 
                </div> 
                <p class="quote">"move one step ahead,today!"</p>
                <p class="made-with">made with ❤️ by Ranaprathap</p>
        </div> 
    </main>

</body>
</html>
